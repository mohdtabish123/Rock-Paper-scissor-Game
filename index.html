<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock paper scissor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>ROCK, PAPER AND SCISSOR</h1>
    <p class="ctn hide">
        <p class="messages hide"></p>
        <BUTTON class="newbtn hide">NEW GAME</BUTTON>
        
    </p>

    <!-- <p class="hide messages1" ></p> -->
    <div class="container">
        <div class="choice" id="rock"> <img src="images/stone.png"> </div>
        <div class="choice" id="paper"> <img src="images/paper.png"> </div>
        <div class="choice" id="scissor"> <img src="images/scissor.jpeg"> </div>
    </div>

    <div class="score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p>USER</p>
        </div>
        <div class="score">
            <p id="comp-score">0</p>
            <p>COMPUTER</p>
        </div>
    </div>

    <div class="message">
        <p id="msg" >Play your move</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
